{% load i18n %}
<div role="tabpanel" class="tab-pane" id="virtual_environments">
  <div class="clearfix profile-panel-actions">
    <div class="pull-left">
      <h3 class="profile-panel-title">{% trans "Virtual Environments" %}</h3>
      <p class="text-muted">
        {% trans "Manage Python environments used by scripts. Click a row to edit it inline." %}
      </p>
    </div>
    <button type="button" class="btn btn-primary pull-right" id="create-virtual-environment">
      {% trans "Add Virtual Environment" %}
    </button>
  </div>

  <div id="virtual-environment-management-alert"></div>

  <div class="table-responsive">
    <table id="virtual-environment-management-table" class="table table-striped table-hover">
      <thead>
        <tr>
          <th>{% trans "Name" %}</th>
          <th>{% trans "Python Binary" %}</th>
          <th>{% trans "Environment Directory" %}</th>
          <th>{% trans "Requirements" %}</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td colspan="4" class="text-muted">{% trans "Loading virtual environments..." %}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
